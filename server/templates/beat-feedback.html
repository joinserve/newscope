{{define "beat-feedback"}}
<div class="beat-feedback-controls" id="beat-feedback-{{.ID}}">
    <button class="action action-like {{if eq .GetUserFeedback "like"}}active{{end}}"
            type="button"
            data-action="like"
            hx-post="/api/v1/beats/{{.ID}}/feedback?action={{if eq .GetUserFeedback "like"}}clear{{else}}like{{end}}"
            hx-swap="outerHTML"
            hx-target="#beat-feedback-{{.ID}}"
            title="Like">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
        </svg>
    </button>
    <button class="action action-dislike {{if eq .GetUserFeedback "dislike"}}active{{end}}"
            type="button"
            data-action="dislike"
            hx-post="/api/v1/beats/{{.ID}}/feedback?action={{if eq .GetUserFeedback "dislike"}}clear{{else}}dislike{{end}}"
            hx-swap="outerHTML"
            hx-target="#beat-feedback-{{.ID}}"
            title="Dislike">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"></path>
        </svg>
    </button>
</div>
{{end}}
