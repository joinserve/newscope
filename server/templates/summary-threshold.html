{{define "summary-threshold.html"}}
<div id="summary-threshold-form" class="setting-item">
    <div class="setting-item-content">
        <label for="summary-threshold-input">Summary Threshold</label>
        <small class="text-muted">
            Articles scoring at or above this value are summarized automatically in Phase 2.
            Lower it for more summaries (higher LLM cost), raise it for fewer.
        </small>
    </div>
    <form class="summary-threshold-form"
          hx-post="/api/v1/settings/summary-threshold"
          hx-target="#summary-threshold-form"
          hx-swap="outerHTML">
        <input id="summary-threshold-input"
               type="number"
               name="threshold"
               step="0.1"
               min="0"
               max="10"
               value="{{printf "%.1f" .SummaryThreshold}}"
               class="form-control">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i>
            Save
        </button>
        {{if .Saved}}
        <span class="text-success summary-threshold-saved">
            <i class="fas fa-check"></i> Saved
        </span>
        {{end}}
    </form>
</div>
{{end}}
