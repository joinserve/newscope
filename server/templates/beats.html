{{template "base.html" .}}

{{define "title"}}Beats - Newscope{{end}}

{{define "content"}}
<div id="ptr-indicator" class="ptr-indicator" aria-hidden="true">
    <span class="ptr-arrow">↓</span>
    <span class="ptr-label">下拉重新整理</span>
</div>

<div class="articles-header beats-header">
    <div class="beats-header-title">
    </div>
    <div class="search-page-container beats-search-container">
        <form action="/api/v1/beats/search" method="get" class="search-page-form"
              hx-get="/api/v1/beats/search"
              hx-target="#articles-with-pagination"
              hx-push-url="true">
            <div class="search-input-wrapper">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="search" id="search-query" name="q" placeholder="搜尋 Beats" value="{{.SearchQuery}}" class="search-page-input">
            </div>
        </form>
    </div>
</div>

<div id="articles-with-pagination">
    <div id="articles-container" class="view-threads">
        <div id="articles-list">
            {{range .Beats}}
            {{template "beat-card.html" .}}
            {{else}}
            <p class="no-articles">Nothing here yet.</p>
            {{end}}

            <!-- Pagination Controls -->
            {{template "pagination" .}}
        </div>
    </div>
</div>

<script>
// auto mark-as-read: a beat-card visible >= 1.5s posts to /api/v1/beats/{id}/view.
// the card stays in the current page; it disappears on the next /beats reload
// because the unread_count gate filters it out server-side.
(function() {
    const VISIBLE_MS = 1500;
    const sent = new Set();
    const timers = new Map();
    function arm() {
        if (!('IntersectionObserver' in window)) return;
        const cards = document.querySelectorAll('.beat-card[data-beat-id]');
        if (!cards.length) return;
        const obs = new IntersectionObserver(function(entries) {
            for (const entry of entries) {
                const id = entry.target.getAttribute('data-beat-id');
                if (!id || sent.has(id)) continue;
                if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
                    if (timers.has(id)) continue;
                    timers.set(id, setTimeout(function() {
                        timers.delete(id);
                        if (sent.has(id)) return;
                        sent.add(id);
                        fetch('/api/v1/beats/' + id + '/view', { method: 'POST', credentials: 'same-origin' })
                            .catch(function() { sent.delete(id); });
                    }, VISIBLE_MS));
                } else {
                    const t = timers.get(id);
                    if (t) { clearTimeout(t); timers.delete(id); }
                }
            }
        }, { threshold: [0, 0.5, 1] });
        cards.forEach(function(c) { obs.observe(c); });
    }
    document.addEventListener('DOMContentLoaded', arm);
    document.addEventListener('htmx:afterSettle', arm);
})();

(function() {
    const THRESHOLD = 80;
    const indicator = document.getElementById('ptr-indicator');
    if (!indicator) return;
    const label = indicator.querySelector('.ptr-label');
    let startY = null;
    let tracking = false;

    function reset() {
        indicator.classList.remove('pulling', 'ready', 'loading');
        label.textContent = '下拉重新整理';
        startY = null;
        tracking = false;
    }

    document.addEventListener('touchstart', function(e) {
        if (window.scrollY > 0) return;
        startY = e.touches[0].clientY;
        tracking = true;
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
        if (!tracking || startY === null) return;
        const dy = e.touches[0].clientY - startY;
        if (dy <= 0) {
            indicator.classList.remove('pulling', 'ready');
            return;
        }
        indicator.classList.add('pulling');
        if (dy >= THRESHOLD) {
            indicator.classList.add('ready');
            label.textContent = '放開即可重新整理';
        } else {
            indicator.classList.remove('ready');
            label.textContent = '下拉重新整理';
        }
    }, { passive: true });

    document.addEventListener('touchend', function() {
        if (!tracking) return;
        const armed = indicator.classList.contains('ready');
        if (!armed) { reset(); return; }
        indicator.classList.remove('ready');
        indicator.classList.add('loading');
        label.textContent = '載入中...';
        const url = window.location.pathname + window.location.search;
        htmx.ajax('GET', url, { target: '#articles-with-pagination', swap: 'innerHTML' })
            .then(reset).catch(reset);
        tracking = false;
        startY = null;
    }, { passive: true });
})();
</script>
{{end}}
