{{template "base.html" .}}

{{define "title"}}Articles - Newscope{{end}}

{{define "content"}}
<div class="articles-header">
    {{if .IsSearch}}
    <div class="search-page-container">
        <form action="/search" method="get" class="search-page-form">
            <div class="search-input-wrapper">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="search" id="search-query" name="q" placeholder="搜尋" value="{{.SearchQuery}}" autofocus class="search-page-input">
                
                <!-- Date Filter Dropdown inside Search Bar -->
                <div class="search-filter-dropdown-container">
                    <button type="button" class="search-filter-toggle" onclick="document.getElementById('search-filter-menu').classList.toggle('show')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
                    </button>
                    <div id="search-filter-menu" class="search-filter-menu">
                        <label class="dropdown-item">
                            <input type="radio" name="date_range" value="all" onchange="this.form.submit()" {{if eq .DateRange "all"}}checked{{end}}>
                            <span>全部時間</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        </label>
                        <label class="dropdown-item">
                            <input type="radio" name="date_range" value="7d" onchange="this.form.submit()" {{if eq .DateRange "7d"}}checked{{end}}>
                            <span>過去 7 天</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </label>
                        <label class="dropdown-item">
                            <input type="radio" name="date_range" value="3d" onchange="this.form.submit()" {{if eq .DateRange "3d"}}checked{{end}}>
                            <span>過去 3 天</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </label>
                        <label class="dropdown-item">
                            <input type="radio" name="date_range" value="today" onchange="this.form.submit()" {{if eq .DateRange "today"}}checked{{end}}>
                            <span>今天</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </label>
                    </div>
                </div>
            </div>
            
            <script>
            // Close dropdown when clicking outside
            document.addEventListener('click', function(event) {
                const menu = document.getElementById('search-filter-menu');
                const toggle = document.querySelector('.search-filter-toggle');
                if (menu && menu.classList.contains('show')) {
                    if (!menu.contains(event.target) && !toggle.contains(event.target)) {
                        menu.classList.remove('show');
                    }
                }
            });
            </script>
            {{if .SelectedSort}}<input type="hidden" name="sort" value="{{.SelectedSort}}">{{end}}
        </form>
    </div>
    {{end}}

    <!-- Hidden state inputs carry liked/processed view flags for all requests that hx-include them -->
    <input type="hidden" id="liked-state" name="liked" value="{{if .ShowLikedOnly}}true{{else}}false{{end}}">
    <input type="hidden" id="processed-state" name="show_processed" value="{{if .ShowProcessed}}true{{else}}false{{end}}">
</div>

<div id="articles-with-pagination">
    <div id="articles-container" class="view-threads">
        <div id="articles-list">
            {{range .Articles}}
            {{template "article-card.html" .}}
            {{else}}
            <p class="no-articles">Nothing here yet.</p>
            {{end}}

            <!-- Pagination Controls -->
            {{template "pagination" .}}
        </div>
    </div>
</div>

<!-- Auto-update score display and localStorage -->
<script>
// Load saved preferences from localStorage
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const hasUrlParams = urlParams.has('sort') || urlParams.has('score') || urlParams.has('topic') || urlParams.has('feed') || urlParams.has('liked') || urlParams.has('date_range');

    // If no URL parameters, apply saved preferences
    if (!hasUrlParams) {
        const savedSort = localStorage.getItem('newscopeSortBy');
        const savedScore = localStorage.getItem('newscopeMinScore');
        const savedLiked = localStorage.getItem('newscopeLikedOnly');
        const savedDateRange = localStorage.getItem('newscopeDateRange');

        let needsUpdate = false;

        if (savedSort && savedSort !== '{{.SelectedSort}}') {
            document.getElementById('sort-filter').value = savedSort;
            needsUpdate = true;
        }
        if (savedScore && savedScore !== '{{.MinScore}}') {
            document.getElementById('score-filter').value = savedScore;
            needsUpdate = true;
        }
        if (savedLiked !== null && savedLiked !== '{{.ShowLikedOnly}}') {
            needsUpdate = true;
        }
        if (savedDateRange && savedDateRange !== '{{.DateRange}}') {
            document.getElementById('date-range-filter').value = savedDateRange;
            needsUpdate = true;
        }

        // Trigger HTMX update if preferences differ from defaults
        if (needsUpdate) {
            htmx.trigger('#sort-filter', 'change');
            return;
        }
    } else {
        // Only save to localStorage when there are URL parameters (explicit user choice)
        localStorage.setItem('newscopeMinScore', '{{.MinScore}}');
        localStorage.setItem('newscopeSortBy', '{{.SelectedSort}}');
        localStorage.setItem('newscopeLikedOnly', '{{.ShowLikedOnly}}');
        localStorage.setItem('newscopeDateRange', '{{.DateRange}}');
    }
    
    // Load saved view mode (this is client-side only)
    const savedView = localStorage.getItem('newscopeViewMode') || 'threads';
    setViewMode(savedView);
});

// Save score selection to localStorage
document.getElementById('score-filter').addEventListener('change', function(e) {
    localStorage.setItem('newscopeMinScore', e.target.value);
});

// View mode functionality
const VIEW_MODES = ['threads'];
function setViewMode(mode) {
    const container = document.getElementById('articles-container');
    if (container) container.className = 'view-threads';
}

// Sort preference persistence
document.getElementById('sort-filter').addEventListener('change', function(e) {
    localStorage.setItem('newscopeSortBy', e.target.value);
});

// Date range preference persistence
document.getElementById('date-range-filter').addEventListener('change', function(e) {
    localStorage.setItem('newscopeDateRange', e.target.value);
});

// Liked button state is managed by server through out-of-band swaps

// Preference persistence and view mode restoration after HTMX updates
document.addEventListener('htmx:afterRequest', function(event) {
    if (event.detail.elt && event.detail.elt.id === 'liked-toggle') {
        // save the localStorage value based on button state after request
        const btn = event.detail.elt;
        const isActive = btn.classList.contains('active');
        localStorage.setItem('newscopeLikedOnly', isActive);
    }
});

// Send view mode with HTMX requests
document.addEventListener('htmx:configRequest', function(event) {
    const container = document.getElementById('articles-container');
    if (!container) return;
    const mode = VIEW_MODES.find(m => container.classList.contains('view-' + m)) || 'threads';
    event.detail.headers['X-View-Mode'] = mode;
});

// Handle topic tag clicks to update the dropdown
document.addEventListener('htmx:beforeRequest', function(event) {
    // Check if the request is from a clickable topic tag
    if (event.detail.elt && event.detail.elt.classList.contains('clickable-topic')) {
        const topic = event.detail.elt.getAttribute('data-topic');
        const topicFilter = document.getElementById('topic-filter');
        if (topicFilter && topic) {
            topicFilter.value = topic;
        }
    }
    
    // Check if the request is from a clickable feed name
    if (event.detail.elt && event.detail.elt.classList.contains('clickable-feed')) {
        const feed = event.detail.elt.getAttribute('data-feed');
        const feedFilter = document.getElementById('feed-filter');
        if (feedFilter && feed) {
            feedFilter.value = feed;
        }
    }
});

// Prevent default link behavior for topic tags and feed names
document.addEventListener('click', function(event) {
    if (event.target && (event.target.classList.contains('clickable-topic') ||
                        event.target.classList.contains('clickable-feed'))) {
        event.preventDefault();
    }
});

// Toast notifications
function showToast(message, opts) {
    opts = opts || {};
    const host = document.getElementById('toast-host') || (function () {
        const h = document.createElement('div');
        h.id = 'toast-host';
        document.body.appendChild(h);
        return h;
    })();
    const el = document.createElement('div');
    el.className = 'toast' + (opts.variant ? ' toast-' + opts.variant : '');
    el.textContent = message;
    host.appendChild(el);
    requestAnimationFrame(() => el.classList.add('visible'));
    setTimeout(() => {
        el.classList.remove('visible');
        setTimeout(() => el.remove(), 300);
    }, opts.duration || 2200);
}

// Share and comment action handlers (delegated)
document.addEventListener('click', function (event) {
    const btn = event.target.closest('.action');
    if (!btn) return;
    const action = btn.dataset.action;
    const card = btn.closest('.article-card');
    if (!card) return;
    if (action === 'share') {
        event.preventDefault();
        const url = card.dataset.shareUrl;
        const title = card.dataset.shareTitle || document.title;
        if (!url) return;
        if (navigator.share) {
            navigator.share({ title: title, url: url }).catch(() => { /* cancelled */ });
            return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(
                () => showToast('Link copied to clipboard'),
                () => showToast('Could not copy link', { variant: 'error' })
            );
            return;
        }
        window.prompt('Copy this link', url);
    } else if (action === 'comment') {
        event.preventDefault();
        showToast('Comments are coming soon');
    }
});

// Double-tap to like (mobile)
(function () {
    const DOUBLE_TAP_MS = 300;
    const DOUBLE_TAP_DIST = 30;

    function triggerAction(card, action) {
        const btn = card.querySelector('.action-' + action);
        if (btn) btn.click();
    }

    const list = document.getElementById('articles-list');
    if (!list) return;

    let lastTap = 0, lastTapX = 0, lastTapY = 0;

    list.addEventListener('touchend', function (e) {
        const card = e.target.closest('.article-card');
        if (!card || e.changedTouches.length !== 1) return;

        const changed = e.changedTouches[0];
        const now = Date.now();
        
        if (now - lastTap < DOUBLE_TAP_MS &&
            Math.abs(changed.clientX - lastTapX) < DOUBLE_TAP_DIST &&
            Math.abs(changed.clientY - lastTapY) < DOUBLE_TAP_DIST) {
            // double tap: like
            if (!e.target.closest('a, button, input, select, textarea')) {
                e.preventDefault();
                triggerAction(card, 'like');
            }
            lastTap = 0;
        } else {
            lastTap = now;
            lastTapX = changed.clientX;
            lastTapY = changed.clientY;
        }
    });
})();

// Keyboard shortcuts: L=like, D=dislike, Space=done, S=share, C=comment
(function () {
    function activeCard() {
        const cards = document.querySelectorAll('#articles-list .article-card');
        if (!cards.length) return null;
        const viewportCenter = window.innerHeight / 2;
        let best = null, bestDist = Infinity;
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            if (rect.bottom < 0 || rect.top > window.innerHeight) return;
            const cardCenter = rect.top + rect.height / 2;
            const d = Math.abs(cardCenter - viewportCenter);
            if (d < bestDist) { bestDist = d; best = card; }
        });
        return best;
    }

    document.addEventListener('keydown', function (e) {
        if (e.ctrlKey || e.altKey || e.metaKey) return;
        const tgt = e.target;
        if (tgt && /^(INPUT|TEXTAREA|SELECT)$/.test(tgt.tagName)) return;
        if (tgt && tgt.isContentEditable) return;

        const key = e.key.toLowerCase();
        let action = null;
        if (key === 'l') action = 'like';
        else if (key === 'd') action = 'dislike';
        else if (key === ' ') action = 'done';
        else if (key === 's') action = 'share';
        else if (key === 'c') action = 'comment';
        if (!action) return;

        const card = activeCard();
        if (!card) return;
        const btn = card.querySelector('.action-' + action);
        if (!btn) return;
        e.preventDefault();
        btn.click();
    });
})();

</script>
{{end}}
