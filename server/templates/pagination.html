{{define "pagination"}}
<div class="pagination" id="pagination"
     {{if .HasNext}}
     hx-get="{{if .IsSearch}}/search{{else}}/articles{{end}}?page={{add .CurrentPage 1}}{{if .IsSearch}}&q={{.SearchQuery}}{{end}}&score={{.MinScore}}&topic={{.SelectedTopic}}&feed={{.SelectedFeed}}&sort={{.SelectedSort}}{{if .ShowLikedOnly}}&liked=on{{end}}{{if .ShowProcessed}}&show_processed=on{{end}}{{if .DateRange}}&date_range={{.DateRange}}{{end}}"
     hx-trigger="revealed"
     hx-swap="outerHTML"
     hx-select=".article-card, #pagination"
     {{end}}>
    
    {{if .HasNext}}
    <div class="load-more-indicator" style="text-align: center; padding: 2rem; color: var(--text-secondary);">
        <svg class="spinner" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <span style="margin-left: 0.5rem; font-size: 0.9375rem;">載入更多文章...</span>
    </div>
    {{else}}
    {{if gt .TotalCount 0}}
    <div class="pagination-info" style="text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 0.9375rem;">
        已顯示所有 {{.TotalCount}} 篇文章
    </div>
    {{end}}
    {{end}}
</div>
{{end}}
